<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="bar">
      <img class="mark" src="icons/icon32.png" alt="" width="20" height="20" />
      <span class="wordmark">Markdowned</span>
      <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
          <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2" />
          <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </button>
    </header>

    <main class="pad">
      <!-- settings (collapsible) -->
      <section id="settings-panel" class="settings" hidden>
        <p class="eyebrow">Output settings</p>
        <label class="check-row">
          <input type="checkbox" id="setting-frontmatter" />
          <span>Include YAML frontmatter (title, url, date)</span>
        </label>
        <div class="grid-2">
          <div class="field">
            <label for="setting-scope">Scope</label>
            <select id="setting-scope">
              <option value="full">Full page</option>
              <option value="main">Main content</option>
            </select>
          </div>
          <div class="field">
            <label for="setting-links">Links</label>
            <select id="setting-links">
              <option value="inlined">Inline [t](url)</option>
              <option value="referenced">Referenced [t][1]</option>
              <option value="strip">Strip (text only)</option>
            </select>
          </div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label for="setting-images">Images</label>
            <select id="setting-images">
              <option value="keep">Keep</option>
              <option value="remove">Remove</option>
            </select>
          </div>
          <div class="field">
            <label for="setting-emphasis">Emphasis</label>
            <select id="setting-emphasis">
              <option value="_">_underscore_</option>
              <option value="*">*asterisk*</option>
            </select>
          </div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label for="setting-heading">Headings</label>
            <select id="setting-heading">
              <option value="atx">ATX (#)</option>
              <option value="setext">Setext (underline)</option>
            </select>
          </div>
          <div class="field">
            <label for="setting-bullet">Bullets</label>
            <select id="setting-bullet">
              <option value="-">-</option>
              <option value="*">*</option>
              <option value="+">+</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="setting-code">Code blocks</label>
          <select id="setting-code">
            <option value="fenced">Fenced (```)</option>
            <option value="indented">Indented</option>
          </select>
        </div>
      </section>

      <!-- primary action -->
      <button id="convert-btn" class="primary-btn">
        <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
          <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9zM13 2v7h7" />
        </svg>
        <span class="btn-label">Convert page</span>
      </button>

      <!-- editor -->
      <textarea id="output" spellcheck="false"
        placeholder="# Markdown will appear here…"></textarea>
      <p id="stats" class="footnote"></p>

      <!-- secondary actions -->
      <div class="actions">
        <button id="copy-btn" class="ghost-btn" disabled>Copy</button>
        <button id="download-btn" class="ghost-btn" disabled>Download .md</button>
      </div>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="js/turndown.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
